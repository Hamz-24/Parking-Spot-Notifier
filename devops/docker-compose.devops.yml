version: '3.8'

services:

  # ─── Jenkins ────────────────────────────────────────────────────────────────
  jenkins:
    build:
      context: ./jenkins
    container_name: parksim-jenkins
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock # Allows Jenkins to build Docker images
    networks:
      - devops-net

  # ─── SonarQube ──────────────────────────────────────────────────────────────
  sonarqube:
    image: sonarqube:10.6-community
    container_name: parksim-sonarqube
    restart: unless-stopped
    ports:
      - "9000:9000"
    environment:
      SONAR_ES_BOOTSTRAP_CHECKS_DISABLE: "true"
    volumes:
      - sonar_data:/opt/sonarqube/data
      - sonar_logs:/opt/sonarqube/logs
      - sonar_extensions:/opt/sonarqube/extensions
    networks:
      - devops-net

networks:
  devops-net:
    driver: bridge

volumes:
  jenkins_home:
  sonar_data:
  sonar_logs:
  sonar_extensions:
