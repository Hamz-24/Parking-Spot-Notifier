[ec2]
# ─────────────────────────────────────────────────────────────────────────────
# Replace <YOUR_EC2_PUBLIC_IP> with the IP from: terraform output public_ip
# ─────────────────────────────────────────────────────────────────────────────
<YOUR_EC2_PUBLIC_IP> ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/id_rsa ansible_ssh_common_args='-o StrictHostKeyChecking=no'

# Example (once you have the IP):
# 54.123.45.67 ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/id_rsa ansible_ssh_common_args='-o StrictHostKeyChecking=no'
