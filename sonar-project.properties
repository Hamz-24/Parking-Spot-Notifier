# =============================================================================
# ParkSim OS — SonarQube Configuration
# Sardar Patel Institute of Technology
# =============================================================================

# ─── Project Identification ──────────────────────────────────────────────────
sonar.projectKey=parksim-os
sonar.projectName=ParkSim OS
sonar.projectVersion=1.0.0
sonar.projectDescription=Microservices-based Parking Notification System

# ─── Source Directories ──────────────────────────────────────────────────────
# All 4 microservice source folders
sonar.sources=backend/api-gateway,backend/user-service,backend/parking-service,backend/notification-service

# Frontend sources
sonar.javascript.file.suffixes=.js,.jsx

# ─── Exclusions ──────────────────────────────────────────────────────────────
sonar.exclusions=\
  **/node_modules/**,\
  **/*.test.js,\
  **/*.spec.js,\
  **/coverage/**,\
  **/dist/**,\
  **/build/**,\
  **/terraform/**,\
  **/ansible/**,\
  frontend/**

# ─── Language ────────────────────────────────────────────────────────────────
sonar.language=js

# ─── SonarQube Server ────────────────────────────────────────────────────────
# For local Docker: http://localhost:9000
# For CI/CD (Jenkins with SonarQube plugin): configured via environment variable
sonar.host.url=http://localhost:9000

# Token is injected by Jenkins via SONAR_TOKEN credential
sonar.token=${SONAR_TOKEN}

# ─── Encoding ────────────────────────────────────────────────────────────────
sonar.sourceEncoding=UTF-8

# ─── Quality Gate Settings ───────────────────────────────────────────────────
# Quality gate is enforced in the Jenkins pipeline via waitForQualityGate()
# Gate config is done in the SonarQube dashboard at http://localhost:9000
#
# Recommended thresholds:
#   Bugs:            0 new bugs
#   Vulnerabilities: 0 critical/major
#   Code Smells:     < 10 new
#   Coverage:        > 60% (requires test runner)
#   Duplications:    < 3%
